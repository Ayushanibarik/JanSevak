version: '3.8'

services:
  db:
    build: .
    container_name: janmitra_db
    environment:
      POSTGRES_USER: janmitra_admin
      POSTGRES_PASSWORD: janmitra_password
      POSTGRES_DB: janmitra_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: janmitra_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: minio/minio
    container_name: janmitra_storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

volumes:
  db_data:
  redis_data:
  minio_data:
